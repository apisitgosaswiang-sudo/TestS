<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0B0B16">
  <title>Workout Tracker</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap');

:root{
  --bg:#0B0B16;
  --bg2:#10101D;
  --surface:#161625;
  --surface2:#1D1D2D;
  --surface3:#232337;
  --border:#2B2B40;
  --border2:#3A3A52;
  --text:#F7F7FB;
  --muted:#9B9BAF;
  --muted2:#68687B;
  --accent:#FF573A;
  --accent2:#FF7048;
  --accent-dark:#E94128;
  --accent-soft:rgba(255,87,58,.14);
  --accentText:#FFFFFF;
  --mint:#45D2C7;
  --mint-soft:rgba(69,210,199,.14);
  --danger:#FF5B68;
  --success:#45D2A0;
  --warning:#FFB348;
  --shadow:0 18px 45px rgba(0,0,0,.26);
  --shadow-soft:0 8px 24px rgba(0,0,0,.16);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{
  margin:0 auto;
  max-width:760px;
  min-height:100vh;
  padding:0 14px calc(92px + env(safe-area-inset-bottom));
  color:var(--text);
  background:
    radial-gradient(circle at 100% -5%, rgba(255,87,58,.13), transparent 26%),
    radial-gradient(circle at -10% 38%, rgba(69,210,199,.07), transparent 22%),
    linear-gradient(180deg,#0A0A14 0%,#0E0E1A 100%);
  font-family:'IBM Plex Sans Thai',sans-serif;
}
button,input,select,textarea{font:inherit}
button{cursor:pointer;transition:.16s ease}
button:active{transform:scale(.97)}
input,select,textarea{min-width:0}
input::placeholder{color:var(--muted2)}
header{
  position:sticky;top:0;z-index:20;
  display:flex;justify-content:space-between;align-items:center;gap:12px;
  padding:15px 4px;
  margin-bottom:18px;
  background:rgba(11,11,22,.9);
  backdrop-filter:blur(18px) saturate(1.2);
  border-bottom:1px solid rgba(58,58,82,.58);
}
.brand-wrap{display:flex;align-items:center;gap:10px;min-width:0}
.dot{
  width:11px;height:11px;flex:none;border-radius:4px;
  background:linear-gradient(145deg,var(--accent),var(--accent2));
  box-shadow:0 0 0 6px rgba(255,87,58,.1);
  transform:rotate(45deg);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:.72;box-shadow:0 0 0 5px rgba(255,87,58,.08)}50%{opacity:1;box-shadow:0 0 0 9px rgba(255,87,58,.015)}}
.brand{font-family:'Barlow Condensed',sans-serif;color:var(--text);font-size:16px;font-weight:800;letter-spacing:.07em;text-transform:uppercase}
.subtitle{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:50vw}
.actions{display:flex;align-items:center;gap:8px;flex:none}
main{padding:0 3px;animation:pageIn .28s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
h1{font-size:25px;line-height:1.2;margin:0 0 6px;letter-spacing:-.025em}
h2{font-size:21px;line-height:1.3;margin:0 0 5px}
h3{font-size:14px;margin:0 0 10px}
p{line-height:1.55}
.muted{font-size:14px;color:var(--muted);margin:0 0 18px}
.small{font-size:12px;color:var(--muted)}
.card{
  position:relative;
  overflow:hidden;
  background:linear-gradient(145deg,rgba(29,29,45,.98),rgba(21,21,35,.98));
  border:1px solid var(--border);
  border-radius:17px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:var(--shadow-soft);
}
.card:hover{border-color:var(--border2)}
.card::after{
  content:"";position:absolute;width:110px;height:110px;right:-82px;top:-82px;border-radius:50%;
  background:rgba(255,87,58,.045);pointer-events:none;
}
.row{display:flex;align-items:center;gap:8px}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:12px}
.stack{display:flex;flex-direction:column;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.input{
  width:100%;padding:12px 13px;
  border:1px solid var(--border);
  border-radius:12px;
  background:#11111E;color:var(--text);
  transition:.16s ease;
}
.input:hover{border-color:var(--border2)}
.input:focus{outline:none;border-color:var(--mint);box-shadow:0 0 0 4px rgba(69,210,199,.1)}
select.input option{background:#151523;color:#fff}
.btn{
  border-radius:12px;padding:10px 14px;
  border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);
}
.btn:hover{border-color:var(--accent)}
.btn-primary{
  border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-weight:700;box-shadow:0 9px 24px rgba(255,87,58,.2);
}
.btn-primary:hover{background:linear-gradient(135deg,var(--accent-dark),var(--accent))}
.btn-danger{border:none;background:transparent;color:var(--danger);padding:7px}
.btn-ghost{background:rgba(29,29,45,.8);color:var(--muted)}
.btn-pill{border-radius:999px;padding:8px 14px;font-size:12px}
.btn-block{width:100%}
.nav{
  display:flex;gap:6px;padding:5px;
  background:#12121F;border:1px solid var(--border);
  border-radius:14px;margin-bottom:18px;
}
.nav button{
  flex:1;padding:10px 8px;background:transparent;border:none;border-radius:10px;color:var(--muted);
}
.nav button.active{
  color:#fff;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:0 7px 18px rgba(255,87,58,.2);
}
.customer{
  width:100%;display:flex;justify-content:space-between;align-items:center;text-align:left;
  background:linear-gradient(145deg,var(--surface2),var(--surface));
  border:1px solid var(--border);border-radius:15px;padding:14px;color:var(--text);
  box-shadow:var(--shadow-soft);
}
.customer:hover{transform:translateY(-1px);border-color:var(--border2)}
.avatar{
  width:43px;height:43px;border-radius:13px;
  background:linear-gradient(145deg,rgba(255,87,58,.22),rgba(255,87,58,.09));
  border:1px solid rgba(255,87,58,.35);
  display:flex;align-items:center;justify-content:center;
  color:#FF8067;font-family:'Barlow Condensed',sans-serif;font-weight:800;
}
.badge{
  display:inline-block;border:1px solid var(--border2);border-radius:999px;
  padding:4px 10px;font-size:11px;color:var(--muted);background:#11111D;
}
.badge-accent{border-color:var(--accent);color:#FF8067;background:var(--accent-soft)}
.exercise{
  position:relative;background:#121220;border:1px solid var(--border);
  border-radius:15px;padding:14px;margin:10px 0;
}
.exercise::before{
  content:"";position:absolute;left:0;top:13px;bottom:13px;width:4px;
  border-radius:0 4px 4px 0;background:linear-gradient(var(--accent),var(--accent2));
}
.exercise-title{font-weight:700}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  border:1px solid var(--border2);border-radius:999px;padding:5px 10px;
  background:#1C1C2B;color:#D7D7E2;
}
.video{
  display:inline-flex;margin-top:10px;color:var(--mint);font-size:12px;text-decoration:none;
  border:1px solid rgba(69,210,199,.34);border-radius:9px;padding:7px 10px;background:var(--mint-soft);
}
.day-tabs{display:flex;gap:8px;overflow:auto;padding:2px 1px 7px;margin-bottom:14px;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tabs button{white-space:nowrap}
.day-tabs .active{
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  border-color:transparent;font-weight:700;box-shadow:0 7px 18px rgba(255,87,58,.2);
}
.success{text-align:center;padding:29px 16px;background:linear-gradient(180deg,#191929,#121220)}
.success-icon{
  width:54px;height:54px;margin:0 auto 13px;border-radius:17px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--mint),#65E2D8);color:#07201F;
  font-size:25px;font-weight:800;box-shadow:0 11px 26px rgba(69,210,199,.18);
}
.log{font-size:12px;color:var(--muted);border-top:1px dashed var(--border);padding-top:9px;margin-top:9px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px}
.stat{
  padding:14px;background:linear-gradient(145deg,var(--surface2),#121220);
  border:1px solid var(--border);border-radius:15px;
}
.stat b{display:block;font-family:'Barlow Condensed',sans-serif;font-size:27px;color:var(--mint)}
.modal{
  position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
  padding:20px;background:rgba(0,0,0,.68);backdrop-filter:blur(7px);
}
.modal-box{
  width:min(100%,330px);background:#181826;border:1px solid var(--border2);
  border-radius:18px;padding:22px;box-shadow:var(--shadow);
}
.pin{text-align:center;font-size:23px;letter-spacing:10px;font-weight:700}
.notice{
  border:1px solid rgba(69,210,199,.38);background:var(--mint-soft);
  border-radius:13px;padding:12px;margin-bottom:12px;font-size:13px;
}
.error{color:var(--danger)}
.loader{display:flex;align-items:center;gap:9px;color:var(--muted);padding:24px 0}
.saving{display:none;font-size:11px;color:var(--mint);font-weight:600}
.toast{
  position:fixed;left:50%;bottom:calc(82px + env(safe-area-inset-bottom));z-index:60;
  transform:translate(-50%,18px);opacity:0;pointer-events:none;
  padding:11px 16px;color:#071817;background:linear-gradient(135deg,var(--mint),#6DE4DB);
  border-radius:999px;box-shadow:0 14px 34px rgba(0,0,0,.35);font-size:13px;font-weight:800;
  transition:.25s ease;
}
.toast.show{opacity:1;transform:translate(-50%,0)}
body::after{
  content:"";
  position:fixed;left:50%;bottom:0;z-index:15;
  width:min(760px,100%);height:66px;transform:translateX(-50%);
  background:rgba(15,15,27,.94);backdrop-filter:blur(18px);
  border-top:1px solid var(--border);
  pointer-events:none;
}
@media(max-width:560px){
  body{padding-left:10px;padding-right:10px}
  header{padding-top:calc(14px + env(safe-area-inset-top))}
  .subtitle{max-width:43vw}
  .grid2,.grid3,.stat-grid{grid-template-columns:1fr}
  .log-grid{grid-template-columns:1fr!important}
  .card{padding:15px}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}


/* =========================
   V2 DASHBOARD
========================= */
.version-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:25px;
  height:18px;
  margin-left:6px;
  padding:0 6px;
  border-radius:999px;
  font-family:'IBM Plex Sans Thai',sans-serif;
  font-size:9px;
  font-weight:700;
  letter-spacing:0;
  color:#071817;
  background:linear-gradient(135deg,var(--mint),#7BE6DE);
  vertical-align:middle;
}
.hero-dashboard{
  position:relative;
  overflow:hidden;
  padding:20px;
  margin-bottom:14px;
  border:1px solid var(--border);
  border-radius:20px;
  background:
    radial-gradient(circle at 95% 0%,rgba(255,87,58,.22),transparent 34%),
    linear-gradient(145deg,#1C1C2D,#121220);
  box-shadow:var(--shadow);
}
.hero-dashboard::after{
  content:"";
  position:absolute;
  width:150px;height:150px;
  right:-75px;bottom:-90px;
  border-radius:50%;
  background:rgba(69,210,199,.07);
}
.hero-eyebrow{
  display:flex;
  align-items:center;
  gap:7px;
  margin-bottom:7px;
  color:var(--mint);
  font-size:11px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.hero-title{
  max-width:440px;
  margin:0 0 8px;
  font-size:27px;
  line-height:1.18;
  letter-spacing:-.025em;
}
.hero-subtitle{
  max-width:470px;
  margin:0;
  color:var(--muted);
  font-size:13px;
}
.hero-actions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:17px;
}
.dashboard-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  margin-bottom:15px;
}
.metric-card{
  position:relative;
  overflow:hidden;
  min-height:116px;
  padding:15px;
  border:1px solid var(--border);
  border-radius:17px;
  background:linear-gradient(145deg,var(--surface2),#121220);
  box-shadow:var(--shadow-soft);
}
.metric-card::after{
  content:"";
  position:absolute;
  width:75px;height:75px;
  right:-35px;bottom:-35px;
  border-radius:50%;
  background:rgba(255,255,255,.025);
}
.metric-icon{
  width:38px;height:38px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:11px;
  border-radius:12px;
  font-size:18px;
  background:var(--accent-soft);
  border:1px solid rgba(255,87,58,.18);
}
.metric-card.mint .metric-icon{background:var(--mint-soft);border-color:rgba(69,210,199,.2)}
.metric-card.warning .metric-icon{background:rgba(255,179,72,.12);border-color:rgba(255,179,72,.18)}
.metric-label{font-size:11px;color:var(--muted);margin-bottom:3px}
.metric-value{
  font-family:'Barlow Condensed',sans-serif;
  font-size:30px;
  font-weight:800;
  line-height:1;
}
.metric-note{margin-top:5px;font-size:11px;color:var(--muted)}
.section-heading{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin:20px 0 10px;
}
.section-heading h3{
  margin:0;
  font-size:15px;
}
.quick-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:9px;
  margin-bottom:15px;
}
.quick-action{
  min-height:92px;
  padding:14px;
  text-align:left;
  border:1px solid var(--border);
  border-radius:16px;
  background:#151523;
  color:var(--text);
}
.quick-action:hover{border-color:var(--accent);transform:translateY(-1px)}
.quick-action .emoji{
  display:block;
  margin-bottom:9px;
  font-size:21px;
}
.quick-action b{display:block;font-size:13px}
.quick-action span{display:block;margin-top:3px;color:var(--muted);font-size:11px}
.status-strip{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:13px 14px;
  margin-bottom:12px;
  border:1px solid rgba(69,210,199,.2);
  border-radius:15px;
  background:linear-gradient(135deg,rgba(69,210,199,.1),rgba(69,210,199,.035));
}
.status-strip strong{font-size:13px}
.status-strip span{font-size:11px;color:var(--muted)}
.mood-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:7px;
}
.mood-option{
  padding:10px 4px;
  border:1px solid var(--border);
  border-radius:13px;
  background:#121220;
  color:var(--text);
  text-align:center;
}
.mood-option:hover,.mood-option.active{
  border-color:var(--mint);
  background:var(--mint-soft);
}
.mood-option .face{display:block;font-size:21px;margin-bottom:3px}
.mood-option small{font-size:9px;color:var(--muted)}
.progress-bar{
  height:8px;
  overflow:hidden;
  border-radius:999px;
  background:#0E0E19;
  border:1px solid var(--border);
}
.progress-bar > span{
  display:block;
  height:100%;
  border-radius:inherit;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}
.customer-summary{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:12px;
}
.customer-meta{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin-top:7px;
}
.customer-meta span{
  padding:4px 8px;
  border-radius:999px;
  background:#11111E;
  border:1px solid var(--border);
  color:var(--muted);
  font-size:10px;
}
.empty-state{
  padding:24px 16px;
  text-align:center;
  border:1px dashed var(--border2);
  border-radius:17px;
  color:var(--muted);
}
.empty-state .emoji{display:block;font-size:28px;margin-bottom:8px}
@media(max-width:560px){
  .hero-dashboard{padding:18px}
  .hero-title{font-size:24px}
  .dashboard-grid,.quick-grid{grid-template-columns:1fr 1fr}
}



/* V2.2 navigation + client dashboard */
.client-nav{position:sticky;top:84px;z-index:12;background:rgba(18,18,31,.96);backdrop-filter:blur(14px)}
.client-hero{padding:18px;margin-bottom:12px;border:1px solid var(--border);border-radius:18px;background:radial-gradient(circle at 100% 0%,rgba(255,87,58,.2),transparent 35%),linear-gradient(145deg,#1B1B2C,#121220);box-shadow:var(--shadow-soft)}
.client-hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
.client-score{min-width:86px;padding:12px;text-align:center;border:1px solid rgba(69,210,199,.25);border-radius:15px;background:var(--mint-soft)}
.client-score b{display:block;font-family:'Barlow Condensed',sans-serif;font-size:28px;color:var(--mint)}
.client-score span{font-size:9px;color:var(--muted)}
.body-snapshot{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.body-snapshot>div{padding:13px;border:1px solid var(--border);border-radius:14px;background:#141422}
.body-snapshot span{display:block;font-size:10px;color:var(--muted);margin-bottom:7px}
.body-snapshot b{font-size:14px;color:var(--text)}
@media(max-width:560px){.client-nav{top:82px;overflow-x:auto;scrollbar-width:none}.client-nav::-webkit-scrollbar{display:none}.client-nav button{min-width:112px;white-space:nowrap}.body-snapshot{grid-template-columns:1fr}.client-hero-top{align-items:center}}


/* =========================
   V2.3 MEMBERSHIP TIMER
========================= */
.customer-summary-line{
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  gap:7px;
  margin-bottom:2px;
}
.package-badge{
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:4px 8px;
  border-radius:999px;
  border:1px solid var(--border2);
  font-size:9px;
  font-weight:700;
  white-space:nowrap;
}
.package-active{
  color:#66E2C7;
  border-color:rgba(69,210,160,.34);
  background:rgba(69,210,160,.1);
}
.package-soon{
  color:#FFC66B;
  border-color:rgba(255,179,72,.4);
  background:rgba(255,179,72,.11);
}
.package-expired{
  color:#FF7A85;
  border-color:rgba(255,91,104,.42);
  background:rgba(255,91,104,.11);
}
.package-unset{
  color:var(--muted);
  background:#121220;
}
.package-meta{
  display:block;
  margin-top:4px;
  color:var(--muted2);
  font-size:10px;
}
.add-customer-card{
  margin-top:10px;
}
.field-label{
  display:flex;
  flex-direction:column;
  gap:7px;
  color:var(--muted);
  font-size:11px;
}
.month-input-wrap{
  position:relative;
}
.month-input-wrap .input{
  padding-right:58px;
}
.month-input-wrap > span{
  position:absolute;
  right:13px;
  top:50%;
  transform:translateY(-50%);
  color:var(--muted);
  font-size:12px;
}
.package-preview{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin:12px 0;
}
.package-preview span{
  padding:7px 10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#11111E;
  color:var(--muted);
  font-size:10px;
}
.package-summary-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:12px;
}
.package-summary{
  display:flex;
  align-items:center;
  gap:9px;
  padding:12px;
  border:1px solid var(--border);
  border-radius:14px;
  background:var(--surface);
}
.package-summary > span{
  font-size:17px;
}
.package-summary b{
  display:block;
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;
}
.package-summary small{
  display:block;
  color:var(--muted);
  font-size:9px;
}
.package-summary.active b{color:var(--success)}
.package-summary.soon b{color:var(--warning)}
.package-summary.expired b{color:var(--danger)}
.subscription-alert{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:13px 14px;

function showToast(message="บันทึกเรียบร้อยแล้ว"){

const today=()=>{const d=new Date();return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()+543}`};

const isoToday=()=>{
  const d=new Date();
  const local=new Date(d.getTime()-d.getTimezoneOffset()*60000);
  return local.toISOString().slice(0,10);
};
function parseThaiOrISODate(value){
  const text=String(value||"").trim();
  if(!text)return null;
  if(/^\d{4}-\d{2}-\d{2}$/.test(text)){
    const [y,m,d]=text.split("-").map(Number);
    return new Date(y,m-1,d);
  }
  const parts=text.split("/");
  if(parts.length===3){
    let [d,m,y]=parts.map(Number);
    if(y>2500)y-=543;
    const date=new Date(y,m-1,d);
    return Number.isNaN(date.getTime())?null:date;
  }
  const date=new Date(text);
  return Number.isNaN(date.getTime())?null:date;
}
function dateToISO(date){
  if(!(date instanceof Date)||Number.isNaN(date.getTime()))return "";
  const local=new Date(date.getTime()-date.getTimezoneOffset()*60000);
  return local.toISOString().slice(0,10);
}
function formatThaiDate(date){
  if(!(date instanceof Date)||Number.isNaN(date.getTime()))return "-";
  return `${String(date.getDate()).padStart(2,"0")}/${String(date.getMonth()+1).padStart(2,"0")}/${date.getFullYear()+543}`;
}
function addMonthsSafe(start,months){
  const date=new Date(start.getFullYear(),start.getMonth(),start.getDate());
  const originalDay=date.getDate();
  date.setDate(1);
  date.setMonth(date.getMonth()+Number(months||0));
  const lastDay=new Date(date.getFullYear(),date.getMonth()+1,0).getDate();
  date.setDate(Math.min(originalDay,lastDay));
  return date;
}
function packageInfo(customer){
  const months=Math.max(0,Number(customer?.subscriptionMonths||0));
  const start=parseThaiOrISODate(customer?.startDateISO||customer?.startDate);
  if(!months||!start){
    return {
      configured:false,
      months:months||0,
      start,
      end:null,
      daysLeft:null,
      status:"unset",
      label:"ยังไม่กำหนดแพ็กเกจ",
      className:"package-unset"
    };
  }
  const end=addMonthsSafe(start,months);
  const now=new Date();
  now.setHours(0,0,0,0);
  end.setHours(23,59,59,999);
  const daysLeft=Math.max(0,Math.ceil((end-now)/86400000));
  const expired=end<now;
  const soon=!expired&&daysLeft<=14;
  return {
    configured:true,
    months,
    start,
    end,
    daysLeft:expired?0:daysLeft,
    status:expired?"expired":soon?"soon":"active",
    label:expired?"หมดอายุแล้ว":soon?`เหลือ ${daysLeft} วัน`:`เหลือ ${daysLeft} วัน`,
    className:expired?"package-expired":soon?"package-soon":"package-active"
  };
}
function packageBadge(customer){
  const p=packageInfo(customer);
  return `<span class="package-badge ${p.className}">${p.status==="expired"?"⛔":p.status==="soon"?"⏳":p.status==="active"?"●":"—"} ${esc(p.label)}</span>`;
}

const emptyData=()=>({customers:[],programs:{},logs:{},catalog:{categories:[]},bodyStats:{}});
let saveTimer=null,ready=false;

function asArray(value){
  if(Array.isArray(value))return value.filter(Boolean);
  if(value && typeof value==="object")return Object.values(value).filter(Boolean);
  return [];
}

function normalize(raw){
  const source=raw&&typeof raw==="object"?raw:{};
  const d={...emptyData(),...source};

  d.customers=asArray(d.customers);
  d.programs=d.programs&&typeof d.programs==="object"?d.programs:{};
  d.logs=d.logs&&typeof d.logs==="object"?d.logs:{};
  d.bodyStats=d.bodyStats&&typeof d.bodyStats==="object"?d.bodyStats:{};

  const catalogSource=d.catalog&&typeof d.catalog==="object"?d.catalog:{};
  d.catalog={categories:asArray(catalogSource.categories).map(cat=>({
    ...cat,
    id:String(cat?.id??uid()),
    name:String(cat?.name??"หมวดหมู่"),
    exercises:asArray(cat?.exercises).map(ex=>({
      ...ex,
      id:String(ex?.id??uid()),
      name:String(ex?.name??""),
      videoUrl:String(ex?.videoUrl??"")
    }))
  }))};

  const used=d.customers.map(x=>String(x?.code??"").trim()).filter(Boolean);

  d.customers=d.customers.map(customer=>{
    const c={...customer};
    c.id=String(c.id??uid());
    c.name=String(c.name??"สมาชิก");
    c.code=String(c.code??"").trim();

    if(!c.code){
      let code;
      do{code=String(Math.floor(10000+Math.random()*90000))}
      while(used.includes(code));
      c.code=code;
      used.push(code);
    }

    if(!c.startDate)c.startDate=today();
    if(!c.startDateISO){
      const parsedStart=parseThaiOrISODate(c.startDate);
      c.startDateISO=parsedStart?dateToISO(parsedStart):isoToday();
    }
    c.subscriptionMonths=Math.max(0,Number(c.subscriptionMonths||0));

    const rawProgram=d.programs[c.id];
    const programSource=Array.isArray(rawProgram)
      ? {days:rawProgram}
      : (rawProgram&&typeof rawProgram==="object"?rawProgram:{});

    d.programs[c.id]={
      ...programSource,
      days:asArray(programSource.days).map((day,index)=>({
        ...day,
        id:String(day?.id??uid()),
        name:String(day?.name??`วันที่ ${index+1}`),
        exercises:asArray(day?.exercises).map(ex=>({
          ...ex,
          id:String(ex?.id??uid()),
          name:String(ex?.name??""),
          catalogId:ex?.catalogId==null?null:String(ex.catalogId),
          sets:String(ex?.sets??"3"),
          reps:String(ex?.reps??"10"),
          weight:String(ex?.weight??""),
          restMinutes:String(ex?.restMinutes??""),
          notes:String(ex?.notes??"")
        }))
      }))
    };

    d.logs[c.id]=asArray(d.logs[c.id]).map(log=>({
      ...log,
      id:String(log?.id??uid()),
      date:String(log?.date??""),
      dayId:log?.dayId==null?"":String(log.dayId),
      dayName:String(log?.dayName??"Workout"),
      entries:asArray(log?.entries).map(entry=>({
        ...entry,
        exerciseId:entry?.exerciseId==null?"":String(entry.exerciseId),
        name:String(entry?.name??"ท่าออกกำลังกาย"),
        actualSets:String(entry?.actualSets??""),
        actualReps:String(entry?.actualReps??""),
        weight:String(entry?.weight??""),
        completed:Boolean(entry?.completed)
      }))
    }));

    d.bodyStats[c.id]=asArray(d.bodyStats[c.id]).map(stat=>({
      ...stat,
      id:String(stat?.id??uid()),
      date:String(stat?.date??""),
      weight:String(stat?.weight??""),
      muscleMass:String(stat?.muscleMass??""),
      bodyFat:String(stat?.bodyFat??""),
      mood:String(stat?.mood??"")
    }));

    return c;
  });

  return d;
}

function showError(e){

  const msg=e?.code==="auth/operation-not-allowed"?"กรุณาเปิด Anonymous Authentication ใน Firebase":"เชื่อมต่อ Firebase ไม่สำเร็จ กรุณาตรวจสอบอินเทอร์เน็ตและ Firebase Rules";

async function init(){

  },450);
}

    <h1>เข้าสู่ระบบ</h1>

function countThisWeekLogs(logs){
  const now=new Date();
  const start=new Date(now);
  const day=(now.getDay()+6)%7;
  start.setHours(0,0,0,0);
  start.setDate(now.getDate()-day);

  return asArray(logs).filter(log=>{
    const parts=String(log?.date||"").split("/");
    if(parts.length!==3)return false;
    const year=Number(parts[2])>2500?Number(parts[2])-543:Number(parts[2]);
    const date=new Date(year,Number(parts[1])-1,Number(parts[0]));
    return date>=start&&date<=now;
  }).length;
}

function trainerDashboardData(){
  const customers=asArray(S.data.customers);
  const totalCustomers=customers.length;
  const totalPrograms=customers.reduce((sum,c)=>sum+asArray(S.data.programs?.[c.id]?.days).length,0);
  const totalLogs=customers.reduce((sum,c)=>sum+asArray(S.data.logs?.[c.id]).length,0);
  const weeklyLogs=customers.reduce((sum,c)=>sum+countThisWeekLogs(S.data.logs?.[c.id]),0);
  const expiringSoon=customers.filter(c=>packageInfo(c).status==="soon").length;
  const expired=customers.filter(c=>packageInfo(c).status==="expired").length;
  const activePackages=customers.filter(c=>packageInfo(c).status==="active").length;
  return {totalCustomers,totalPrograms,totalLogs,weeklyLogs,expiringSoon,expired,activePackages};
}

          </div>

      </div>
      <div class="package-preview" id="packagePreview"></div>
      <button class="btn btn-primary btn-block" id="addCustomer">เพิ่มลูกเทรนและเริ่มนับเวลา</button>
    </div>`:""}
    ${S.lastCode?`<div class="notice">เพิ่ม <b>${esc(S.lastCode.name)}</b> แล้ว<br>รหัสสมาชิก: <b style="color:var(--accent)">${esc(S.lastCode.code)}</b> · แพ็กเกจ ${esc(S.lastCode.subscriptionMonths||"-")} เดือน</div>`:""}

  bindNav();
  const bindCards=()=>$$("[data-customer]").forEach(b=>b.onclick=()=>{S.customerId=b.dataset.customer;S.screen="program";S.programTab="overview";renderFromTop()});
  bindCards();
  $("#searchCustomer").oninput=e=>{
    const q=e.target.value.toLowerCase();
    const list=S.data.customers.filter(c=>c.name.toLowerCase().includes(q)||c.code.includes(q));
    $("#customerList").innerHTML=list.length?list.map(customerCard).join(""):`<p class="small">ไม่พบข้อมูล</p>`;bindCards();
  };
  $("#toggleAdd").onclick=()=>{S.showAdd=!S.showAdd;render()};
  const updatePackagePreview=()=>{
    if(!$("#subscriptionMonths")||!$("#packagePreview"))return;
    const months=Math.max(1,Number($("#subscriptionMonths").value||1));
    const start=new Date();
    const end=addMonthsSafe(start,months);
    $("#packagePreview").innerHTML=`<span>📅 เริ่ม ${formatThaiDate(start)}</span><span>🏁 สิ้นสุด ${formatThaiDate(end)}</span><span>⏱ ${months} เดือน</span>`;
  };
  if($("#subscriptionMonths")){
    $("#subscriptionMonths").oninput=updatePackagePreview;
    updatePackagePreview();
  }
  if($("#addCustomer"))$("#addCustomer").onclick=()=>{
    const name=$("#newCustomer").value.trim();
    const subscriptionMonths=Math.max(1,Number($("#subscriptionMonths")?.value||1));
    if(!name)return alert("กรุณากรอกชื่อลูกเทรน");
    if(!Number.isFinite(subscriptionMonths)||subscriptionMonths<1)return alert("กรุณากรอกระยะเวลาอย่างน้อย 1 เดือน");
    const id=uid(),used=S.data.customers.map(c=>c.code);let code;
    do{code=String(Math.floor(10000+Math.random()*90000))}while(used.includes(code));
    S.data.customers.push({
      id,
      name,
      code,
      startDate:today(),
      startDateISO:isoToday(),
      subscriptionMonths
    });
    S.data.programs[id]={days:[]};
    S.data.logs[id]=[];
    S.data.bodyStats[id]=[];
    S.showAdd=false;
    S.lastCode={name,code,subscriptionMonths};
    save();
    renderFromTop();
  };
}

function catalogOptions(){
  return S.data.catalog.categories.map(c=>`<optgroup label="${esc(c.name)}">${c.exercises.map(e=>`<option value="${e.id}">${esc(e.name||"(ไม่มีชื่อ)")}</option>`).join("")}</optgroup>`).join("");

function findCatalog(id){

  if($("#addDay"))$("#addDay").onclick=()=>{p.days.push({id:uid(),name:`วันที่ ${p.days.length+1}`,exercises:[]});save();render()};
  $$("[data-day-name]").forEach(i=>i.oninput=()=>{p.days.find(d=>String(d.id)===String(i.dataset.dayName)).name=i.value;save()});
  $$("[data-remove-day]").forEach(b=>b.onclick=()=>{p.days=p.days.filter(d=>d.id!==b.dataset.removeDay);save();render()});
  $$("[data-add-program-ex]").forEach(b=>b.onclick=()=>{const day=p.days.find(d=>String(d.id)===String(b.dataset.addProgramEx)),sel=$(`[data-select-day="${day.id}"]`),v=sel.value;if(!v)return;const ce=v==="__custom__"?null:findCatalog(v);day.exercises.push({id:uid(),name:ce?.name||"",catalogId:ce?v:null,sets:"3",reps:"10",weight:"",restMinutes:"",notes:""});save();render()});
  $$("[data-remove-program-ex]").forEach(b=>b.onclick=()=>{const [did,eid]=b.dataset.removeProgramEx.split("|"),d=p.days.find(x=>String(x.id)===String(did));d.exercises=d.exercises.filter(x=>x.id!==eid);save();render()});
  $$("[data-field]").forEach(i=>i.oninput=()=>{const d=p.days.find(x=>String(x.id)===String(i.dataset.day)),e=d.exercises.find(x=>String(x.id)===String(i.dataset.ex));e[i.dataset.field]=i.value;save()});
}
function logHtml(l){
  const entries=asArray(l?.entries);
  return `<div class="card"><div class="row-between"><b>${esc(l?.dayName||"Workout")}</b><span class="small">${esc(l?.date||"-")}</span></div>${entries.map(e=>`<div class="log">${esc(e?.name||"ท่าออกกำลังกาย")}: ${esc(e?.actualSets||"-")} เซ็ท × ${esc(e?.actualReps||"-")} ครั้ง ${e?.weight?`@ ${esc(e.weight)} kg`:""} ${e?.completed?"✓":""}</div>`).join("")}</div>`;
}
function renderCustomer(){
  const c=S.data.customers.find(x=>String(x.id)===String(S.customerId));
  if(!c){logout();return}
  const p=S.data.programs[c.id]||{days:[]},logs=S.data.logs[c.id]||[],stats=S.data.bodyStats[c.id]||[];
  const memberPkg=packageInfo(c);
  if(!S.activeDayId&&p.days.length)S.activeDayId=p.days[0].id;
  const day=p.days.find(d=>String(d.id)===String(S.activeDayId));
  const existing=day?logs.find(l=>String(l.dayId)===String(day.id)&&l.date===today()):null;
  const tabs=p.days.map(d=>`<button class="btn btn-pill ${String(d.id)===String(S.activeDayId)?"active":""}" data-daytab="${d.id}">${esc(d.name)}</button>`).join("");
  let workout="";
  if(!p.days.length)workout=`<div class="card"><p class="small">เทรนเนอร์ยังไม่ได้กำหนดWorkout Plan</p></div>`;
  else if(!day)workout=`<div class="card"><p class="small">ไม่พบวันฝึกที่เลือก กรุณาเลือกวันฝึกใหม่</p></div>`;
  else if(existing)workout=`<div class="card success"><div class="success-icon">✓</div><h3>บันทึกTodayเรียบร้อยแล้ว</h3><p class="small">${esc(existing.dayName)} · ${esc(existing.date)}</p>${existing.entries.map(e=>`<div class="log">${esc(e.name)}: ${esc(e.actualSets||"-")} × ${esc(e.actualReps||"-")} ${e.completed?"✓":""}</div>`).join("")}<button class="btn" id="editToday" style="margin-top:14px">แก้ไข</button></div>`;
  else workout=`<div class="card">${day.exercises.length?day.exercises.map(ex=>{const ce=ex.catalogId?findCatalog(ex.catalogId):null,e=S.entries[ex.id]||{};return `<div class="exercise"><div class="exercise-title">${esc(ce?.name||ex.name)}</div><div class="tags"><span class="tag">${esc(ex.sets)} เซ็ท</span><span class="tag">${esc(ex.reps)} ครั้ง</span>${ex.weight?`<span class="tag">${esc(ex.weight)} kg</span>`:""}</div>${ce?.videoUrl?`<a class="video" target="_blank" rel="noopener" href="${esc(ce.videoUrl)}">▶ ดูวิดีโอ</a>`:""}<div class="grid3 log-grid" style="margin-top:10px"><input class="input" placeholder="เซ็ทที่ทำได้" value="${esc(e.actualSets||"")}" data-entry="actualSets|${ex.id}"><input class="input" placeholder="ครั้งที่ทำได้" value="${esc(e.actualReps||"")}" data-entry="actualReps|${ex.id}"><input class="input" placeholder="น้ำหนัก kg" value="${esc(e.weight||"")}" data-entry="weight|${ex.id}"></div><label class="small" style="display:block;margin-top:9px"><input type="checkbox" data-check="${ex.id}" ${e.completed?"checked":""}> ทำแล้ว</label></div>`}).join(""):`<p class="small">Todayยังไม่มีท่าออกกำลังกาย</p>`}<button class="btn btn-primary btn-block" id="saveWorkout">Complete Workout</button></div>`;
  const body=`<div class="card">
    <h3>Daily Check-in</h3>
    <p class="small">วันนี้คุณรู้สึกอย่างไร</p>
    <div class="mood-row" id="moodRow">
      <button class="mood-option" data-mood="ยอดเยี่ยม"><span class="face">😄</span><small>ยอดเยี่ยม</small></button>
      <button class="mood-option" data-mood="ดี"><span class="face">🙂</span><small>ดี</small></button>
      <button class="mood-option" data-mood="ปกติ"><span class="face">😐</span><small>ปกติ</small></button>
      <button class="mood-option" data-mood="ล้า"><span class="face">😮‍💨</span><small>ล้า</small></button>
      <button class="mood-option" data-mood="ควรพัก"><span class="face">😴</span><small>ควรพัก</small></button>
    </div>
    <div class="grid3" style="margin-top:12px">
      <input class="input" id="weight" placeholder="น้ำหนัก kg">
      <input class="input" id="muscle" placeholder="กล้ามเนื้อ kg">
      <input class="input" id="fat" placeholder="ไขมัน %">
    </div>
    <button class="btn btn-primary btn-block" id="saveBody" style="margin-top:10px">Save Check-in</button>
  </div>${stats.length?stats.slice().reverse().map(s=>`<div class="card"><div class="row-between"><b>${esc(s.date)}</b><span class="small">น้ำหนัก ${esc(s.weight||"-")} kg · กล้ามเนื้อ ${esc(s.muscleMass||"-")} kg · ไขมัน ${esc(s.bodyFat||"-")}%</span></div></div>`).join(""):`<p class="small">ยังไม่มีประวัติ</p>`}`;
  $("#app").innerHTML=`
    <section class="hero-dashboard">
      <div class="hero-eyebrow">🔥 MEMBER DASHBOARD</div>
      <h2 class="hero-title">สวัสดี ${esc(c.name)}</h2>
      <p class="hero-subtitle">${today()} · รหัสสมาชิก <b style="color:var(--mint)">${esc(c.code)}</b></p>
      <div class="member-package-status ${memberPkg.className}">
        <span>${memberPkg.status==="expired"?"⛔":memberPkg.status==="soon"?"⏳":memberPkg.status==="active"?"📅":"🗓️"}</span>
        <div><b>${esc(memberPkg.label)}</b><small>${memberPkg.configured?`ใช้งานถึง ${formatThaiDate(memberPkg.end)}`:"กรุณาติดต่อเทรนเนอร์เพื่อกำหนดแพ็กเกจ"}</small></div>
      </div>
    </section>
    <div class="nav"><button data-ctab="today" class="${S.customerTab==="today"?"active":""}">Today</button><button data-ctab="body" class="${S.customerTab==="body"?"active":""}">Check-in</button></div>
    ${S.customerTab==="body"?body:`<div class="day-tabs">${tabs}</div>${workout}<h3 style="margin-top:22px">Recent Workouts</h3>${logs.length?logs.slice().reverse().map(logHtml).join(""):`<p class="small">ยังไม่มีประวัติ</p>`}`}`;
  let selectedMood="";
  $$("[data-mood]").forEach(b=>b.onclick=()=>{
    selectedMood=b.dataset.mood;
    $$("[data-mood]").forEach(x=>x.classList.toggle("active",x===b));
  });
  $$("[data-ctab]").forEach(b=>b.onclick=()=>{S.customerTab=b.dataset.ctab;renderFromTop()});
  $$("[data-daytab]").forEach(b=>b.onclick=()=>{S.activeDayId=b.dataset.daytab;S.entries={};renderFromTop()});
  $$("[data-entry]").forEach(i=>i.oninput=()=>{const [field,id]=i.dataset.entry.split("|");S.entries[id]={...(S.entries[id]||{}),[field]:i.value}});
  $$("[data-check]").forEach(i=>i.onchange=()=>{S.entries[i.dataset.check]={...(S.entries[i.dataset.check]||{}),completed:i.checked}});
  if($("#editToday"))$("#editToday").onclick=()=>{existing.entries.forEach(e=>S.entries[e.exerciseId]={actualSets:e.actualSets,actualReps:e.actualReps,weight:e.weight,completed:e.completed});S.data.logs[c.id]=logs.filter(l=>l.id!==existing.id);render()};
  if($("#saveWorkout"))$("#saveWorkout").onclick=()=>{
    if(!day)return;
    const log={id:uid(),date:today(),dayId:day.id,dayName:day.name,entries:day.exercises.map(ex=>{const ce=ex.catalogId?findCatalog(ex.catalogId):null,e=S.entries[ex.id]||{};return{exerciseId:ex.id,name:ce?.name||ex.name,targetSets:ex.sets,targetReps:ex.reps,actualSets:e.actualSets||"",actualReps:e.actualReps||"",weight:e.weight||"",completed:!!e.completed}})};
    const idx=logs.findIndex(l=>l.dayId===day.id&&l.date===today());if(idx>=0){log.id=logs[idx].id;logs[idx]=log}else logs.push(log);
    S.entries={};save();render();
  };
  if($("#saveBody"))$("#saveBody").onclick=()=>{
    const entry={id:uid(),date:today(),mood:selectedMood,weight:$("#weight").value.trim(),muscleMass:$("#muscle").value.trim(),bodyFat:$("#fat").value.trim()};
    if(!entry.weight&&!entry.muscleMass&&!entry.bodyFat)return;
    const idx=stats.findIndex(x=>x.date===entry.date);if(idx>=0){entry.id=stats[idx].id;stats[idx]=entry}else stats.push(entry);save();render();
  };
}

$("#trainerBtn").onclick=()=>{$("#pinModal").style.display="flex";$("#pinInput").focus()};
$("#logoutBtn").onclick=logout;
$("#pinCancel").onclick=()=>$("#pinModal").style.display="none";
$("#pinConfirm").onclick=()=>{
  if($("#pinInput").value.trim()==="0409"){S.role="trainer";S.screen="customers";S.dashboardMode=true;$("#pinModal").style.display="none";$("#pinInput").value="";render()}
  else $("#pinError").hidden=false;
};
$("#pinInput").onkeydown=e=>{if(e.key==="Enter")$("#pinConfirm").click()};
$("#pinModal").onclick=e=>{if(e.target.id==="pinModal")$("#pinModal").style.display="none"};

init();

  </script>
</body>
</html>
