<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FAFAFB">
<title>Workout Tracker</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap');

:root{
  --bg:#FAFAFB;
  --bg-soft:#F5F5F7;
  --surface:#FFFFFF;
  --surface2:#F7F7F9;
  --surface3:#F2F2F4;
  --border:#E5E5EA;
  --border2:#CFCFD6;
  --text:#202124;
  --muted:#666A73;
  --muted2:#A2A4AB;
  --accent:#B51E4A;
  --accent2:#D63A5F;
  --accent-dark:#8F153A;
  --accent-soft:#F7DCE4;
  --accentText:#FFFFFF;
  --danger:#C62B3D;
  --success:#2FA36B;
  --shadow:0 12px 34px rgba(63,31,42,.09);
  --shadow-soft:0 6px 18px rgba(63,31,42,.055);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{
  position:relative;
  margin:0 auto;
  max-width:760px;
  min-height:100vh;
  padding:0 14px calc(72px + env(safe-area-inset-bottom));
  color:var(--text);
  background:
    radial-gradient(circle at 100% 0%, rgba(181,30,74,.10), transparent 27%),
    radial-gradient(circle at 0% 26%, rgba(143,21,58,.055), transparent 23%),
    linear-gradient(180deg,#FFFFFF 0%,var(--bg) 58%,#F7F7F8 100%);
  font-family:'IBM Plex Sans Thai',sans-serif;
}
body::before{
  content:"";
  position:fixed;
  width:220px;height:220px;
  border-radius:50%;
  right:-130px;bottom:8%;
  background:rgba(143,21,58,.045);
  filter:blur(2px);
  pointer-events:none;
}
button,input,select,textarea{font:inherit}
button{cursor:pointer;transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease,background .16s ease,color .16s ease}
button:active{transform:scale(.97)}
input,select,textarea{min-width:0}
input::placeholder{color:var(--muted2)}
::selection{background:var(--accent-soft);color:var(--text)}

header{
  position:sticky;top:0;z-index:10;
  display:flex;justify-content:space-between;align-items:center;gap:12px;
  padding:16px 4px;
  background:rgba(250,250,251,.90);
  backdrop-filter:blur(18px) saturate(1.25);
  border-bottom:1px solid rgba(229,229,234,.92);
  margin-bottom:22px;
}
.brand-wrap{display:flex;align-items:center;gap:10px;min-width:0}
.dot{
  width:10px;height:10px;flex:none;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:0 0 0 5px rgba(233,79,114,.11);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:.65;transform:scale(.9);box-shadow:0 0 0 4px rgba(233,79,114,.08)}
  50%{opacity:1;transform:scale(1.08);box-shadow:0 0 0 8px rgba(233,79,114,.02)}
}
.brand{
  font-family:'Barlow Condensed',sans-serif;
  color:var(--accent);
  font-size:15px;font-weight:700;letter-spacing:.065em;text-transform:uppercase
}
.subtitle{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52vw}
.actions{display:flex;align-items:center;gap:8px;flex:none}
main{padding:0 4px;animation:pageIn .3s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

h1{font-size:25px;line-height:1.25;margin:0 0 6px;letter-spacing:-.02em}
h2{font-size:21px;line-height:1.3;margin:0 0 5px}
h3{font-size:14px;margin:0 0 10px}
p{line-height:1.55}
.muted{font-size:14px;color:var(--muted);margin:0 0 20px}
.small{font-size:12px;color:var(--muted)}

.card{
  position:relative;
  overflow:hidden;
  background:rgba(255,255,255,.96);
  border:1px solid var(--border);
  border-radius:16px;
  padding:17px;
  margin-bottom:13px;
  box-shadow:var(--shadow-soft);
  transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease;
}
.card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.card::after{
  content:"";
  position:absolute;
  width:90px;height:90px;
  right:-62px;top:-62px;
  border-radius:50%;
  background:rgba(233,79,114,.035);
  pointer-events:none;
}
.row{display:flex;align-items:center;gap:8px}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:12px}
.stack{display:flex;flex-direction:column;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

.input{
  width:100%;
  padding:12px 13px;
  border:1px solid var(--border);
  border-radius:13px;
  background:#FFF;
  color:var(--text);
  box-shadow:inset 0 1px 2px rgba(111,55,74,.025);
  transition:border-color .16s ease,box-shadow .16s ease,background .16s ease;
}
.input:hover{border-color:var(--border2)}
.input:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(233,79,114,.11);
  background:#fff;
}

.btn{
  border-radius:13px;
  padding:10px 14px;
  border:1px solid var(--border2);
  background:rgba(255,255,255,.94);
  color:var(--text);
  box-shadow:0 3px 10px rgba(127,45,73,.035);
}
.btn:hover{border-color:var(--accent);box-shadow:0 7px 18px rgba(127,45,73,.08)}
.btn-primary{
  border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:var(--accentText);
  font-weight:700;
  box-shadow:0 9px 22px rgba(233,79,114,.24);
}
.btn-primary:hover{
  background:linear-gradient(135deg,var(--accent-dark),var(--accent));
  box-shadow:0 12px 26px rgba(233,79,114,.3);
}
.btn-danger{border:none;background:transparent;color:var(--danger);padding:7px;box-shadow:none}
.btn-ghost{background:rgba(255,255,255,.7);color:var(--muted)}
.btn-pill{border-radius:999px;padding:8px 14px;font-size:12px}
.btn-block{width:100%}

.nav{
  display:flex;gap:8px;
  padding:5px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.72);
  border-radius:15px;
  margin-bottom:20px;
  box-shadow:0 4px 16px rgba(127,45,73,.04);
}
.nav button{
  flex:1;
  padding:9px 10px;
  background:none;border:none;border-radius:11px;
  color:var(--muted);
}
.nav button.active{
  color:#fff;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:0 6px 16px rgba(233,79,114,.2);
}

.customer{
  width:100%;
  display:flex;justify-content:space-between;align-items:center;
  text-align:left;
  background:rgba(255,255,255,.97);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  box-shadow:var(--shadow-soft);
}
.customer:hover{
  transform:translateY(-2px);
  border-color:var(--border2);
  box-shadow:var(--shadow);
}
.avatar{
  width:42px;height:42px;border-radius:14px;
  background:linear-gradient(145deg,#F8E8ED,#EFC7D2);
  border:1px solid #DFA8B8;
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
}
.badge{
  display:inline-block;
  border:1px solid var(--border2);
  border-radius:999px;padding:4px 10px;
  font-size:11px;color:var(--muted);
  background:#FCFCFD;
}
.badge-accent{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

.exercise{
  position:relative;
  background:linear-gradient(180deg,#FFFFFF,#F8F8FA);
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px;
  margin:10px 0;
}
.exercise::before{
  content:"";
  position:absolute;left:0;top:14px;bottom:14px;width:4px;
  border-radius:0 4px 4px 0;
  background:linear-gradient(var(--accent),var(--accent2));
}
.exercise-title{font-weight:700;padding-left:3px}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:700;
  border:1px solid #D9C5CC;
  border-radius:999px;padding:5px 10px;
  background:#FFF;color:#4C313A;
}
.video{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:10px;
  color:var(--accent);
  font-size:12px;text-decoration:none;
  border:1px solid #F0C7D2;
  border-radius:10px;padding:7px 10px;
  background:#fff;
}
.video:hover{background:var(--accent-soft)}

.day-tabs{
  display:flex;gap:8px;overflow:auto;
  padding:2px 1px 7px;margin-bottom:14px;
  scrollbar-width:none;
}
.day-tabs::-webkit-scrollbar{display:none}
.day-tabs button{white-space:nowrap}
.day-tabs .active{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:var(--accentText);
  border-color:transparent;
  font-weight:700;
  box-shadow:0 7px 17px rgba(233,79,114,.22);
}

.success{
  text-align:center;padding:30px 16px;
  background:linear-gradient(180deg,#FFFFFF,#F7F7F9);
}
.success-icon{
  width:54px;height:54px;margin:0 auto 13px;
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:var(--accentText);
  font-size:25px;font-weight:700;
  box-shadow:0 11px 26px rgba(233,79,114,.26);
  animation:successPop .48s cubic-bezier(.2,.8,.2,1);
}
@keyframes successPop{
  0%{transform:scale(.35) rotate(-12deg);opacity:0}
  75%{transform:scale(1.08) rotate(2deg)}
  100%{transform:scale(1);opacity:1}
}
.log{font-size:12px;color:var(--muted);border-top:1px dashed var(--border);padding-top:9px;margin-top:9px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px}
.stat{
  padding:15px;
  background:linear-gradient(145deg,#FFFFFF,#F6F6F8);
  border:1px solid var(--border);
  border-radius:17px;
  box-shadow:var(--shadow-soft);
}
.stat b{display:block;font-family:'Barlow Condensed',sans-serif;font-size:28px;color:var(--accent)}

.modal{
  position:fixed;inset:0;z-index:30;
  display:none;align-items:center;justify-content:center;
  padding:20px;
  background:rgba(64,31,43,.38);
  backdrop-filter:blur(7px);
}
.modal-box{
  width:min(100%,330px);
  background:rgba(255,255,255,.98);
  border:1px solid var(--border);
  border-radius:22px;
  padding:23px;
  box-shadow:0 26px 70px rgba(80,32,51,.2);
  animation:modalIn .22s ease;
}
@keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
.pin{text-align:center;font-size:23px;letter-spacing:10px;font-weight:700}
.notice{
  border:1px solid #F1BCCA;
  background:linear-gradient(135deg,#FFFFFF,#F6E6EB);
  border-radius:15px;padding:12px;margin-bottom:12px;
  font-size:13px;
  box-shadow:var(--shadow-soft);
}
.error{color:var(--danger)}
.loader{display:flex;align-items:center;gap:9px;color:var(--muted);padding:24px 0}
.saving{display:none;font-size:11px;color:var(--accent);font-weight:600}

.toast{
  position:fixed;
  left:50%;
  bottom:calc(22px + env(safe-area-inset-bottom));
  z-index:50;
  transform:translate(-50%,18px);
  opacity:0;
  pointer-events:none;
  padding:11px 16px;
  color:#fff;
  background:linear-gradient(135deg,var(--accent-dark),var(--accent));
  border-radius:999px;
  box-shadow:0 14px 34px rgba(111,20,51,.24);
  font-size:13px;font-weight:700;
  transition:.25s ease;
}
.toast.show{opacity:1;transform:translate(-50%,0)}


header::after{
  content:"";
  position:absolute;
  left:0;right:0;bottom:-1px;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:.72;
}
.brand{font-size:15px}
.customer::after{
  content:"";
  width:5px;height:5px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 0 4px rgba(181,30,74,.08);
}
.nav button.active{letter-spacing:.01em}
.btn-primary{text-transform:none}

@media(max-width:560px){
  body{padding-left:10px;padding-right:10px}
  header{padding-top:calc(14px + env(safe-area-inset-top))}
  .subtitle{max-width:43vw}
  .grid2,.grid3,.stat-grid{grid-template-columns:1fr}
  .log-grid{grid-template-columns:1fr!important}
  .desktop-hide{display:none}
  .card{border-radius:14px;padding:15px}
  h1{font-size:23px}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}

</style>
</head>
<body>
<header>
  <div class="brand-wrap">
    <span class="dot"></span>
    <div style="min-width:0">
      <div class="brand">Workout Tracker</div>
      <div class="subtitle">บันทึกการออกกำลังกายตามโปรแกรมของเทรนเนอร์</div>
    </div>
  </div>
  <div class="actions">
    <span class="saving" id="saving">กำลังบันทึก...</span>
    <button class="btn btn-pill btn-ghost" id="trainerBtn">เทรนเนอร์</button>
    <button class="btn btn-pill btn-ghost" id="logoutBtn" hidden>ออกจากระบบ</button>
  </div>
</header>

<main id="app"></main>
<div class="toast" id="toast">บันทึกเรียบร้อยแล้ว</div>

<div class="modal" id="pinModal">
  <div class="modal-box">
    <h3>เข้าสู่ระบบเทรนเนอร์</h3>
    <p class="small">กรอกรหัส 4 หลัก</p>
    <input id="pinInput" class="input pin" maxlength="4" inputmode="numeric" placeholder="••••">
    <p id="pinError" class="small error" hidden>รหัสไม่ถูกต้อง</p>
    <div class="grid2" style="margin-top:14px">
      <button class="btn" id="pinCancel">ยกเลิก</button>
      <button class="btn btn-primary" id="pinConfirm">เข้าสู่ระบบ</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig={
  apiKey:"AIzaSyBNqoMN6VHh1OqShZ0LZL0mYCaH28orx-g",
  authDomain:"online-trainer-c.firebaseapp.com",
  databaseURL:"https://online-trainer-c-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"online-trainer-c",
  storageBucket:"online-trainer-c.firebasestorage.app",
  messagingSenderId:"93729536725",
  appId:"1:93729536725:web:56efadd1a93563fe63805c",
  measurementId:"G-1ZZBFHNS4R"
};

const fb=initializeApp(firebaseConfig);
const db=getDatabase(fb);
const auth=getAuth(fb);
const dataRef=ref(db,"workoutTrackerData");
const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
const esc=v=>String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid=()=>Math.random().toString(36).slice(2,9);
let toastTimer=null;
function showToast(message="บันทึกเรียบร้อยแล้ว"){
  const t=$("#toast");
  if(!t)return;
  t.textContent=message;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),1800);
}
const today=()=>{const d=new Date();return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()+543}`};
const emptyData=()=>({customers:[],programs:{},logs:{},catalog:{categories:[]},bodyStats:{}});
let saveTimer=null,ready=false;
let S={data:null,role:null,screen:"customers",customerId:null,activeDayId:null,customerTab:"today",programTab:"program",entries:{},showAdd:false,lastCode:null};

function normalize(raw){
  const d={...emptyData(),...(raw||{})};
  d.customers=Array.isArray(d.customers)?d.customers:[];
  d.programs=d.programs||{};d.logs=d.logs||{};d.bodyStats=d.bodyStats||{};
  d.catalog=d.catalog&&Array.isArray(d.catalog.categories)?d.catalog:{categories:[]};
  const used=d.customers.map(x=>x.code).filter(Boolean);
  d.customers.forEach(c=>{
    if(c.id!==undefined&&c.id!==null)c.id=String(c.id);
    if(c.code!==undefined&&c.code!==null)c.code=String(c.code).trim();
    if(!c.code){let code;do{code=String(Math.floor(10000+Math.random()*90000))}while(used.includes(code));c.code=code;used.push(code)}
    if(!c.startDate)c.startDate=today();
    d.programs[c.id] ||= {days:[]};d.logs[c.id] ||= [];d.bodyStats[c.id] ||= [];
  });
  return d;
}

function showLoading(text="กำลังโหลดข้อมูล..."){
  $("#app").innerHTML=`<div class="loader"><span class="dot"></span><span>${esc(text)}</span></div>`;
}
function showError(e){
  console.error(e);
  const msg=e?.code==="auth/operation-not-allowed"?"กรุณาเปิด Anonymous Authentication ใน Firebase":"เชื่อมต่อ Firebase ไม่สำเร็จ กรุณาตรวจสอบอินเทอร์เน็ตและ Firebase Rules";
  $("#app").innerHTML=`<div class="card"><h3 class="error">เชื่อมต่อระบบไม่สำเร็จ</h3><p class="small">${esc(msg)}</p><button class="btn btn-primary" onclick="location.reload()">ลองใหม่</button></div>`;
}
async function init(){
  showLoading("กำลังเชื่อมต่อ Firebase...");
  try{
    await signInAnonymously(auth);
    const snap=await get(dataRef);
    S.data=normalize(snap.exists()?snap.val():emptyData());
    ready=true;
    if(!snap.exists())await set(dataRef,S.data);
    render();
  }catch(e){showError(e)}
}
function save(){
  if(!ready)return;
  $("#saving").style.display="inline";
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{await set(dataRef,S.data);showToast()}
    catch(e){console.error(e);alert("บันทึกข้อมูลไม่สำเร็จ กรุณาลองใหม่")}
    finally{$("#saving").style.display="none"}
  },450);
}
function logout(){
  S={...S,role:null,screen:"customers",customerId:null,activeDayId:null,customerTab:"today",programTab:"program",entries:{},showAdd:false,lastCode:null};
  render();
}
function updateHeader(){
  $("#trainerBtn").hidden=!!S.role;
  $("#logoutBtn").hidden=!S.role;
}
function render(){
  updateHeader();
  if(!S.role)return renderLogin();
  if(S.role==="trainer"){
    if(S.screen==="catalog")return renderCatalog();
    if(S.screen==="program")return renderProgram();
    return renderCustomers();
  }
  return renderCustomer();
}
function nav(active){
  return `<div class="nav"><button data-nav="customers" class="${active==="customers"?"active":""}">ลูกเทรน</button><button data-nav="catalog" class="${active==="catalog"?"active":""}">คลังท่าออกกำลังกาย</button></div>`;
}
function bindNav(){
  $$("[data-nav]").forEach(b=>b.onclick=()=>{S.screen=b.dataset.nav;render()});
}

function renderLogin(){
  $("#app").innerHTML=`
    <h1>เข้าสู่ระบบ</h1>
    <p class="muted">กรอกรหัสสมาชิก 5 หลักที่เทรนเนอร์ให้ไว้</p>
    <div class="card" style="max-width:380px">
      <div class="row">
        <input class="input" id="memberCode" maxlength="5" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]*" placeholder="รหัสสมาชิก 5 หลัก">
        <button class="btn btn-primary" id="memberLogin">เข้าสู่ระบบ</button>
      </div>
      <p id="memberError" class="small error" hidden>ไม่พบรหัสสมาชิกนี้</p>
    </div>`;
  const login=()=>{
    const code=$("#memberCode").value.trim();
    const c=S.data.customers.find(x=>String(x.code??"").trim()===code);
    if(!c)return $("#memberError").hidden=false;
    S.role="customer";S.customerId=c.id;S.activeDayId=S.data.programs[c.id]?.days?.[0]?.id||null;render();
  };
  $("#memberLogin").onclick=login;
  $("#memberCode").oninput=e=>{
    e.target.value=e.target.value.replace(/\D/g,"").slice(0,5);
    $("#memberError").hidden=true;
  };
  $("#memberCode").onkeydown=e=>{if(e.key==="Enter")login()};
}

function customerCard(c){
  const days=S.data.programs[c.id]?.days?.length||0,logs=S.data.logs[c.id]?.length||0;
  return `<button class="customer" data-customer="${c.id}">
    <span class="row"><span class="avatar">${esc((c.name||"").slice(0,2))}</span>
      <span><b>${esc(c.name)}</b><span class="small" style="display:block">รหัส ${esc(c.code)} · ${days} วันฝึก · บันทึก ${logs} ครั้ง</span></span>
    </span><span>›</span></button>`;
}
function renderCustomers(){
  $("#app").innerHTML=`
    ${nav("customers")}
    <h1>ลูกเทรนของฉัน</h1>
    <p class="muted">เลือกลูกเทรนเพื่อจัดโปรแกรมหรือดูผลการฝึก</p>
    <input class="input" id="searchCustomer" placeholder="ค้นหาชื่อหรือรหัสสมาชิก..." style="margin-bottom:10px">
    <button class="btn btn-block" id="toggleAdd">+ เพิ่มลูกเทรน</button>
    ${S.showAdd?`<div class="row" style="margin:10px 0"><input class="input" id="newCustomer" placeholder="ชื่อลูกเทรน"><button class="btn btn-primary" id="addCustomer">เพิ่ม</button></div>`:""}
    ${S.lastCode?`<div class="notice">เพิ่ม <b>${esc(S.lastCode.name)}</b> แล้ว<br>รหัสสมาชิก: <b style="color:var(--accent)">${esc(S.lastCode.code)}</b></div>`:""}
    <div class="stack" id="customerList">${S.data.customers.length?S.data.customers.map(customerCard).join(""):`<p class="small">ยังไม่มีลูกเทรน</p>`}</div>`;
  bindNav();
  const bindCards=()=>$$("[data-customer]").forEach(b=>b.onclick=()=>{S.customerId=b.dataset.customer;S.screen="program";S.programTab="program";render()});
  bindCards();
  $("#searchCustomer").oninput=e=>{
    const q=e.target.value.toLowerCase();
    const list=S.data.customers.filter(c=>c.name.toLowerCase().includes(q)||c.code.includes(q));
    $("#customerList").innerHTML=list.length?list.map(customerCard).join(""):`<p class="small">ไม่พบข้อมูล</p>`;bindCards();
  };
  $("#toggleAdd").onclick=()=>{S.showAdd=!S.showAdd;render()};
  if($("#addCustomer"))$("#addCustomer").onclick=()=>{
    const name=$("#newCustomer").value.trim();if(!name)return;
    const id=uid(),used=S.data.customers.map(c=>c.code);let code;
    do{code=String(Math.floor(10000+Math.random()*90000))}while(used.includes(code));
    S.data.customers.push({id,name,code,startDate:today()});S.data.programs[id]={days:[]};S.data.logs[id]=[];S.data.bodyStats[id]=[];
    S.showAdd=false;S.lastCode={name,code};save();render();
  };
}

function renderCatalog(){
  const cats=S.data.catalog.categories.map(cat=>`
    <div class="card">
      <div class="row-between">
        <input class="input" value="${esc(cat.name)}" data-cat-name="${cat.id}">
        <button class="btn-danger" data-remove-cat="${cat.id}">ลบ</button>
      </div>
      ${cat.exercises.map(ex=>`<div class="row" style="margin-top:8px">
        <input class="input" placeholder="ชื่อท่า" value="${esc(ex.name)}" data-ex-name="${cat.id}|${ex.id}">
        <input class="input" placeholder="ลิงก์วิดีโอ" value="${esc(ex.videoUrl||"")}" data-ex-url="${cat.id}|${ex.id}">
        <button class="btn-danger" data-remove-ex="${cat.id}|${ex.id}">×</button>
      </div>`).join("")}
      <button class="btn btn-block" data-add-ex="${cat.id}" style="margin-top:9px">+ เพิ่มท่า</button>
    </div>`).join("");
  $("#app").innerHTML=`
    ${nav("catalog")}
    <h1>คลังท่าออกกำลังกาย</h1>
    <p class="muted">สร้างหมวดและแนบลิงก์วิดีโอสำหรับเลือกใช้ในโปรแกรม</p>
    ${cats||`<p class="small">ยังไม่มีหมวดหมู่</p>`}
    <div class="row"><input class="input" id="newCat" placeholder="ชื่อหมวดหมู่ใหม่"><button class="btn btn-primary" id="addCat">เพิ่มหมวด</button></div>`;
  bindNav();
  $("#addCat").onclick=()=>{const name=$("#newCat").value.trim();if(!name)return;S.data.catalog.categories.push({id:uid(),name,exercises:[]});save();render()};
  $$("[data-cat-name]").forEach(i=>i.oninput=()=>{S.data.catalog.categories.find(c=>String(c.id)===String(i.dataset.catName)).name=i.value;save()});
  $$("[data-remove-cat]").forEach(b=>b.onclick=()=>{S.data.catalog.categories=S.data.catalog.categories.filter(c=>c.id!==b.dataset.removeCat);save();render()});
  $$("[data-add-ex]").forEach(b=>b.onclick=()=>{S.data.catalog.categories.find(c=>String(c.id)===String(b.dataset.addEx)).exercises.push({id:uid(),name:"",videoUrl:""});save();render()});
  $$("[data-remove-ex]").forEach(b=>b.onclick=()=>{const [cid,eid]=b.dataset.removeEx.split("|"),c=S.data.catalog.categories.find(x=>String(x.id)===String(cid));c.exercises=c.exercises.filter(x=>x.id!==eid);save();render()});
  $$("[data-ex-name]").forEach(i=>i.oninput=()=>{const [cid,eid]=i.dataset.exName.split("|");S.data.catalog.categories.find(c=>c.id===cid).exercises.find(e=>e.id===eid).name=i.value;save()});
  $$("[data-ex-url]").forEach(i=>i.oninput=()=>{const [cid,eid]=i.dataset.exUrl.split("|");S.data.catalog.categories.find(c=>c.id===cid).exercises.find(e=>e.id===eid).videoUrl=i.value;save()});
}
function catalogOptions(){
  return S.data.catalog.categories.map(c=>`<optgroup label="${esc(c.name)}">${c.exercises.map(e=>`<option value="${e.id}">${esc(e.name||"(ไม่มีชื่อ)")}</option>`).join("")}</optgroup>`).join("");
}
function findCatalog(id){
  for(const c of S.data.catalog.categories){const e=c.exercises.find(x=>String(x.id)===String(id));if(e)return {...e,category:c.name}}
  return null;
}
function renderProgram(){
  const c=S.data.customers.find(x=>String(x.id)===String(S.customerId));
  if(!c){S.screen="customers";return renderCustomers()}
  const p=S.data.programs[c.id]||{days:[]},logs=S.data.logs[c.id]||[],stats=S.data.bodyStats[c.id]||[];
  const programHtml=p.days.map(day=>`<div class="card">
    <div class="row-between">
      <input class="input" value="${esc(day.name)}" data-day-name="${day.id}">
      <button class="btn-danger" data-remove-day="${day.id}">ลบวัน</button>
    </div>
    ${day.exercises.map(ex=>{const ce=ex.catalogId?findCatalog(ex.catalogId):null;return `<div class="exercise">
      <div class="row-between"><b>${esc(ce?.name||ex.name||"(ไม่มีชื่อท่า)")}</b><button class="btn-danger" data-remove-program-ex="${day.id}|${ex.id}">×</button></div>
      <div class="grid3" style="margin-top:8px">
        <input class="input" placeholder="เซ็ท" value="${esc(ex.sets)}" data-field="sets" data-day="${day.id}" data-ex="${ex.id}">
        <input class="input" placeholder="ครั้ง" value="${esc(ex.reps)}" data-field="reps" data-day="${day.id}" data-ex="${ex.id}">
        <input class="input" placeholder="น้ำหนัก kg" value="${esc(ex.weight||"")}" data-field="weight" data-day="${day.id}" data-ex="${ex.id}">
      </div>
      <div class="grid2" style="margin-top:8px">
        <input class="input" placeholder="พัก (นาที)" value="${esc(ex.restMinutes||"")}" data-field="restMinutes" data-day="${day.id}" data-ex="${ex.id}">
        <input class="input" placeholder="หมายเหตุ" value="${esc(ex.notes||"")}" data-field="notes" data-day="${day.id}" data-ex="${ex.id}">
      </div>
    </div>`}).join("")}
    <div class="row"><select class="input" data-select-day="${day.id}"><option value="">เลือกท่าจากคลัง</option>${catalogOptions()}<option value="__custom__">ท่ากำหนดเอง</option></select><button class="btn btn-primary" data-add-program-ex="${day.id}">เพิ่ม</button></div>
  </div>`).join("");
  const latest=stats[stats.length-1]||{};
  const dashboard=`<div class="stat-grid">
    <div class="stat"><span class="small">น้ำหนักล่าสุด</span><b>${esc(latest.weight||"-")}</b><span class="small">kg</span></div>
    <div class="stat"><span class="small">กล้ามเนื้อล่าสุด</span><b>${esc(latest.muscleMass||"-")}</b><span class="small">kg</span></div>
    <div class="stat"><span class="small">ไขมันล่าสุด</span><b>${esc(latest.bodyFat||"-")}</b><span class="small">%</span></div>
  </div>
  <h3>ประวัติการออกกำลังกาย</h3>${logs.length?logs.slice().reverse().map(logHtml).join(""):`<p class="small">ยังไม่มีข้อมูล</p>`}
  <h3 style="margin-top:20px">ประวัติข้อมูลร่างกาย</h3>${stats.length?stats.slice().reverse().map(s=>`<div class="card"><div class="row-between"><b>${esc(s.date)}</b><span class="small">น้ำหนัก ${esc(s.weight||"-")} kg · กล้ามเนื้อ ${esc(s.muscleMass||"-")} kg · ไขมัน ${esc(s.bodyFat||"-")}%</span></div></div>`).join(""):`<p class="small">ยังไม่มีข้อมูล</p>`}`;
  $("#app").innerHTML=`
    <button class="btn btn-ghost" id="backCustomers">‹ ลูกเทรนทั้งหมด</button>
    <h2>${esc(c.name)} <span class="badge">รหัส ${esc(c.code)}</span></h2>
    <p class="small">เริ่มเทรน ${esc(c.startDate)}</p>
    <div class="nav"><button data-ptab="program" class="${S.programTab==="program"?"active":""}">โปรแกรม</button><button data-ptab="dashboard" class="${S.programTab==="dashboard"?"active":""}">Dashboard</button></div>
    ${S.programTab==="dashboard"?dashboard:`${programHtml}<button class="btn btn-primary btn-block" id="addDay">+ เพิ่มวันฝึก</button>`}`;
  $("#backCustomers").onclick=()=>{S.screen="customers";render()};
  $$("[data-ptab]").forEach(b=>b.onclick=()=>{S.programTab=b.dataset.ptab;render()});
  if($("#addDay"))$("#addDay").onclick=()=>{p.days.push({id:uid(),name:`วันที่ ${p.days.length+1}`,exercises:[]});save();render()};
  $$("[data-day-name]").forEach(i=>i.oninput=()=>{p.days.find(d=>String(d.id)===String(i.dataset.dayName)).name=i.value;save()});
  $$("[data-remove-day]").forEach(b=>b.onclick=()=>{p.days=p.days.filter(d=>d.id!==b.dataset.removeDay);save();render()});
  $$("[data-add-program-ex]").forEach(b=>b.onclick=()=>{const day=p.days.find(d=>String(d.id)===String(b.dataset.addProgramEx)),sel=$(`[data-select-day="${day.id}"]`),v=sel.value;if(!v)return;const ce=v==="__custom__"?null:findCatalog(v);day.exercises.push({id:uid(),name:ce?.name||"",catalogId:ce?v:null,sets:"3",reps:"10",weight:"",restMinutes:"",notes:""});save();render()});
  $$("[data-remove-program-ex]").forEach(b=>b.onclick=()=>{const [did,eid]=b.dataset.removeProgramEx.split("|"),d=p.days.find(x=>String(x.id)===String(did));d.exercises=d.exercises.filter(x=>x.id!==eid);save();render()});
  $$("[data-field]").forEach(i=>i.oninput=()=>{const d=p.days.find(x=>String(x.id)===String(i.dataset.day)),e=d.exercises.find(x=>String(x.id)===String(i.dataset.ex));e[i.dataset.field]=i.value;save()});
}
function logHtml(l){
  return `<div class="card"><div class="row-between"><b>${esc(l.dayName)}</b><span class="small">${esc(l.date)}</span></div>${l.entries.map(e=>`<div class="log">${esc(e.name)}: ${esc(e.actualSets||"-")} เซ็ท × ${esc(e.actualReps||"-")} ครั้ง ${e.weight?`@ ${esc(e.weight)} kg`:""} ${e.completed?"✓":""}</div>`).join("")}</div>`;
}
function renderCustomer(){
  const c=S.data.customers.find(x=>String(x.id)===String(S.customerId));
  if(!c){logout();return}
  const p=S.data.programs[c.id]||{days:[]},logs=S.data.logs[c.id]||[],stats=S.data.bodyStats[c.id]||[];
  if(!S.activeDayId&&p.days.length)S.activeDayId=p.days[0].id;
  const day=p.days.find(d=>String(d.id)===String(S.activeDayId));
  const existing=day?logs.find(l=>String(l.dayId)===String(day.id)&&l.date===today()):null;
  const tabs=p.days.map(d=>`<button class="btn btn-pill ${String(d.id)===String(S.activeDayId)?"active":""}" data-daytab="${d.id}">${esc(d.name)}</button>`).join("");
  let workout="";
  if(!p.days.length)workout=`<div class="card"><p class="small">เทรนเนอร์ยังไม่ได้กำหนดโปรแกรม</p></div>`;
  else if(existing)workout=`<div class="card success"><div class="success-icon">✓</div><h3>บันทึกวันนี้เรียบร้อยแล้ว</h3><p class="small">${esc(existing.dayName)} · ${esc(existing.date)}</p>${existing.entries.map(e=>`<div class="log">${esc(e.name)}: ${esc(e.actualSets||"-")} × ${esc(e.actualReps||"-")} ${e.completed?"✓":""}</div>`).join("")}<button class="btn" id="editToday" style="margin-top:14px">แก้ไข</button></div>`;
  else workout=`<div class="card">${day.exercises.length?day.exercises.map(ex=>{const ce=ex.catalogId?findCatalog(ex.catalogId):null,e=S.entries[ex.id]||{};return `<div class="exercise"><div class="exercise-title">${esc(ce?.name||ex.name)}</div><div class="tags"><span class="tag">${esc(ex.sets)} เซ็ท</span><span class="tag">${esc(ex.reps)} ครั้ง</span>${ex.weight?`<span class="tag">${esc(ex.weight)} kg</span>`:""}</div>${ce?.videoUrl?`<a class="video" target="_blank" rel="noopener" href="${esc(ce.videoUrl)}">▶ ดูวิดีโอ</a>`:""}<div class="grid3 log-grid" style="margin-top:10px"><input class="input" placeholder="เซ็ทที่ทำได้" value="${esc(e.actualSets||"")}" data-entry="actualSets|${ex.id}"><input class="input" placeholder="ครั้งที่ทำได้" value="${esc(e.actualReps||"")}" data-entry="actualReps|${ex.id}"><input class="input" placeholder="น้ำหนัก kg" value="${esc(e.weight||"")}" data-entry="weight|${ex.id}"></div><label class="small" style="display:block;margin-top:9px"><input type="checkbox" data-check="${ex.id}" ${e.completed?"checked":""}> ทำแล้ว</label></div>`}).join(""):`<p class="small">วันนี้ยังไม่มีท่าออกกำลังกาย</p>`}<button class="btn btn-primary btn-block" id="saveWorkout">บันทึกการออกกำลังกายวันนี้</button></div>`;
  const body=`<div class="card"><h3>บันทึกข้อมูลร่างกายวันนี้</h3><div class="grid3"><input class="input" id="weight" placeholder="น้ำหนัก kg"><input class="input" id="muscle" placeholder="กล้ามเนื้อ kg"><input class="input" id="fat" placeholder="ไขมัน %"></div><button class="btn btn-primary btn-block" id="saveBody" style="margin-top:10px">บันทึกข้อมูลร่างกาย</button></div>${stats.length?stats.slice().reverse().map(s=>`<div class="card"><div class="row-between"><b>${esc(s.date)}</b><span class="small">น้ำหนัก ${esc(s.weight||"-")} kg · กล้ามเนื้อ ${esc(s.muscleMass||"-")} kg · ไขมัน ${esc(s.bodyFat||"-")}%</span></div></div>`).join(""):`<p class="small">ยังไม่มีประวัติ</p>`}`;
  $("#app").innerHTML=`
    <h2>สวัสดี ${esc(c.name)}</h2><p class="small">${today()} · รหัสสมาชิก <b style="color:var(--accent)">${esc(c.code)}</b></p>
    <div class="nav"><button data-ctab="today" class="${S.customerTab==="today"?"active":""}">วันนี้</button><button data-ctab="body" class="${S.customerTab==="body"?"active":""}">ข้อมูลร่างกาย</button></div>
    ${S.customerTab==="body"?body:`<div class="day-tabs">${tabs}</div>${workout}<h3 style="margin-top:22px">ประวัติของฉัน</h3>${logs.length?logs.slice().reverse().map(logHtml).join(""):`<p class="small">ยังไม่มีประวัติ</p>`}`}`;
  $$("[data-ctab]").forEach(b=>b.onclick=()=>{S.customerTab=b.dataset.ctab;render()});
  $$("[data-daytab]").forEach(b=>b.onclick=()=>{S.activeDayId=b.dataset.daytab;S.entries={};render()});
  $$("[data-entry]").forEach(i=>i.oninput=()=>{const [field,id]=i.dataset.entry.split("|");S.entries[id]={...(S.entries[id]||{}),[field]:i.value}});
  $$("[data-check]").forEach(i=>i.onchange=()=>{S.entries[i.dataset.check]={...(S.entries[i.dataset.check]||{}),completed:i.checked}});
  if($("#editToday"))$("#editToday").onclick=()=>{existing.entries.forEach(e=>S.entries[e.exerciseId]={actualSets:e.actualSets,actualReps:e.actualReps,weight:e.weight,completed:e.completed});S.data.logs[c.id]=logs.filter(l=>l.id!==existing.id);render()};
  if($("#saveWorkout"))$("#saveWorkout").onclick=()=>{
    if(!day)return;
    const log={id:uid(),date:today(),dayId:day.id,dayName:day.name,entries:day.exercises.map(ex=>{const ce=ex.catalogId?findCatalog(ex.catalogId):null,e=S.entries[ex.id]||{};return{exerciseId:ex.id,name:ce?.name||ex.name,targetSets:ex.sets,targetReps:ex.reps,actualSets:e.actualSets||"",actualReps:e.actualReps||"",weight:e.weight||"",completed:!!e.completed}})};
    const idx=logs.findIndex(l=>l.dayId===day.id&&l.date===today());if(idx>=0){log.id=logs[idx].id;logs[idx]=log}else logs.push(log);
    S.entries={};save();render();
  };
  if($("#saveBody"))$("#saveBody").onclick=()=>{
    const entry={id:uid(),date:today(),weight:$("#weight").value.trim(),muscleMass:$("#muscle").value.trim(),bodyFat:$("#fat").value.trim()};
    if(!entry.weight&&!entry.muscleMass&&!entry.bodyFat)return;
    const idx=stats.findIndex(x=>x.date===entry.date);if(idx>=0){entry.id=stats[idx].id;stats[idx]=entry}else stats.push(entry);save();render();
  };
}

$("#trainerBtn").onclick=()=>{$("#pinModal").style.display="flex";$("#pinInput").focus()};
$("#logoutBtn").onclick=logout;
$("#pinCancel").onclick=()=>$("#pinModal").style.display="none";
$("#pinConfirm").onclick=()=>{
  if($("#pinInput").value.trim()==="0409"){S.role="trainer";S.screen="customers";$("#pinModal").style.display="none";$("#pinInput").value="";render()}
  else $("#pinError").hidden=false;
};
$("#pinInput").onkeydown=e=>{if(e.key==="Enter")$("#pinConfirm").click()};
$("#pinModal").onclick=e=>{if(e.target.id==="pinModal")$("#pinModal").style.display="none"};

init();
</script>
</body>
</html>
